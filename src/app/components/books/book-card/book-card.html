<div class="book-card" [class.mobile]="isMobile$ | async">
  <div class="book-cover-container">
    <img [src]="book.coverImage" [alt]="book.title + ' cover'" class="book-cover">
  </div>

  <div class="book-details">
    <h2 class="book-title">{{ book.title }}</h2>
    <h3 class="book-author">by {{ book.author }}</h3>
    
    <p class="book-description">
      {{ book.description }}
    </p>

    <div class="book-metadata-grid">
      <span>
        <strong>current page:</strong> {{ book.currentPage }}
      </span>
      <span>
        <strong>pages:</strong> {{ book.pageCount }}
      </span>
      @if (currentlyReading || finished) {
        <span>
          <strong>started:</strong> {{ formatDate(book.startDate) }}
        </span>
        <span>
          <strong>finished:</strong> {{ formatDate(book.finishDate) }}
        </span>
      }
    </div>

    <div class="book-progress-grid">
      @if (currentlyReading) {
        <span>
          <jwpaisley-book-reading-progress 
            [totalPages]="book.pageCount || 1" 
            [currentPage]="book.currentPage || 0"
          />
        </span>
      }
    </div>
  </div>
</div>
