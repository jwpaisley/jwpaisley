<div class="input-wrapper" [class]="'size-' + size" [class.disabled]="disabled">
  @if (label) {
    <label class="input-label">{{ label | lowercase }}</label>
  }
  
  <div class="input-container">
    <input
      type="date"
      [value]="value"
      [placeholder]="placeholder"
      [disabled]="disabled"
      (input)="handleInput($event)"
      (blur)="onTouched()"
      class="input"
    />
  </div>
</div>
