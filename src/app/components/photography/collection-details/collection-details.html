<jwpaisley-loader [isLoading]="isLoading">
  <div class="collection-details" *ngIf="collection; else notFound">
    <div class="back-link-row">
      <a class="back-link" [routerLink]="['/photography', 'collections']">
        <span class="back-arrow" aria-hidden="true">←</span>
        <span>back to collections</span>
      </a>
    </div>

    <div class="hero">
      <h2>{{ collection.title || 'untitled collection' }}</h2>
      <p *ngIf="collection.caption">{{ collection.caption }}</p>
      <p *ngIf="collection.location">{{ collection.location }}</p>

      @if (isAdmin) {
        <div class="admin-actions">
          <jwpaisley-button variant="primary" (click)="onEditCollectionClick()">
            edit
          </jwpaisley-button>
          <jwpaisley-button variant="danger" (click)="onDeleteCollectionClick()">
            delete
          </jwpaisley-button>
        </div>
      }
    </div>

    <div class="photo-grid" *ngIf="photos.length > 0; else noPhotos">
      <button class="photo-card" type="button" *ngFor="let photo of photos" (click)="openImageDialog(photo)">
        <img [src]="getPhotoPreviewUrl(photo)" [alt]="photo.caption || 'collection photo'" loading="lazy" decoding="async" />
      </button>
    </div>

    <ng-template #noPhotos>
      <jwpaisley-empty-state
        emoji="📷"
        title="no photos yet"
        subtitle="this collection is waiting for its first photo"
      ></jwpaisley-empty-state>
    </ng-template>
  </div>

  <ng-template #notFound>
    <div class="empty-state">collection not found</div>
  </ng-template>
</jwpaisley-loader>

@if (showDeleteConfirmation) {
  <jwpaisley-confirmation-dialog
    icon="delete"
    title="delete this collection?"
    text="this action cannot be undone."
    confirmLabel="delete"
    cancelLabel="cancel"
    (confirm)="confirmDeleteCollection()"
    (cancel)="cancelDeleteCollection()">
  </jwpaisley-confirmation-dialog>
}

<jwpaisley-image-dialog
  [imageUrl]="selectedImageUrl"
  [isOpen]="isImageDialogOpen"
  [showPrevious]="selectedImageIndex > 0"
  [showNext]="selectedImageIndex < photos.length - 1"
  (previous)="showPreviousImage()"
  (next)="showNextImage()"
  (closed)="closeImageDialog()"
></jwpaisley-image-dialog>

@if (showEditCollectionDialog) {
  <jwpaisley-add-collection-dialog
    mode="edit"
    [collection]="collection"
    [photos]="photos"
    (confirm)="handleEditCollectionConfirm($event)"
    (cancel)="closeEditCollectionDialog()"
  ></jwpaisley-add-collection-dialog>
}
