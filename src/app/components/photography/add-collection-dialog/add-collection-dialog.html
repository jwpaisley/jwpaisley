<div class="dialog-backdrop" (click)="onCancel()">
  <div class="dialog-card" (click)="$event.stopPropagation()">
    <button class="close-x" type="button" (click)="onCancel()">
      <mat-icon>close</mat-icon>
    </button>

    <div class="content">
      <h1>create collection</h1>
      <p>add a title and a short description for the new photo collection</p>

      <div class="field-group">
        <jwpaisley-form-input
          label="title"
          placeholder="collection title"
          [(ngModel)]="title"
        ></jwpaisley-form-input>
      </div>

      <div class="field-group">
        <jwpaisley-form-text-area
          label="description"
          placeholder="collection description"
          [(ngModel)]="description"
        ></jwpaisley-form-text-area>
      </div>

      <div class="field-group">
        <jwpaisley-form-image-upload
          label="images"
          [(ngModel)]="images"
        ></jwpaisley-form-image-upload>
      </div>
    </div>

    <div class="actions">
      <jwpaisley-button variant="primary" (click)="onConfirm()">
        create
      </jwpaisley-button>
      <jwpaisley-button variant="secondary" (click)="onCancel()">
        cancel
      </jwpaisley-button>
    </div>
  </div>
</div>
