<div class="dialog-backdrop" (click)="onCancel()">
  <div class="dialog-card" (click)="$event.stopPropagation()">
    <button class="close-x" type="button" (click)="onCancel()">
      <mat-icon>close</mat-icon>
    </button>

    <div class="content">
      <h1>create collection</h1>
      <div class="field-group">
        <jwpaisley-form-input
          label="title"
          placeholder="ex: sailing trip to angel island"
          [ngModel]="title"
          (ngModelChange)="onTitleChange($event)"
        ></jwpaisley-form-input>
      </div>

      <div class="field-group">
        <jwpaisley-form-text-area
          label="description"
          placeholder="ex: photos from my recent sailing trip to angel island with some friends"
          [ngModel]="description"
          (ngModelChange)="onDescriptionChange($event)"
        ></jwpaisley-form-text-area>
      </div>

      <div class="field-group">
        <jwpaisley-form-input
          label="location"
          placeholder="ex: san francisco, ca"
          [ngModel]="location"
          (ngModelChange)="onLocationChange($event)"
        ></jwpaisley-form-input>
      </div>

      <div class="field-group">
        <jwpaisley-form-image-upload
          label="images"
          [ngModel]="images"
          (ngModelChange)="onImagesChange($event)"
        ></jwpaisley-form-image-upload>
      </div>
    </div>

    <div class="actions">
      <jwpaisley-button
        variant="primary"
        [disabled]="disableCreateButton"
        (click)="onConfirm()"
      >
        create
      </jwpaisley-button>
      <jwpaisley-button variant="secondary" (click)="onCancel()">
        cancel
      </jwpaisley-button>
    </div>
  </div>
</div>
